<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prezzi Carburante Italia</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            background: '#09090b',
            card: '#18181b',
            border: '#27272a',
            primary: '#10b981', // Emerald
            muted: '#a1a1aa'
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    #map { height: 100vh; }
    .leaflet-popup-content { color: #000; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body class="bg-background text-white">

  <div class="flex flex-col md:flex-row md:h-screen">
    <!-- Sidebar -->
    <div class="w-full md:w-96 bg-card md:border-r border-border p-6 md:overflow-auto">
      <h1 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <span class="text-primary">⛽</span> Prezzi Carburante
      </h1>

      <div class="mb-6 space-y-2">
        <label class="text-xs font-medium text-muted">Cerca città o indirizzo</label>
        <div class="flex gap-2">
          <input id="citySearch" type="text" placeholder="Roma, Torino..." 
                 class="flex-1 bg-background border border-border rounded-sm p-2 text-sm focus:ring-1 focus:ring-primary outline-none"
                 onkeydown="if(event.key === 'Enter') searchCity()">
          <button onclick="searchCity()" class="bg-border hover:bg-zinc-700 px-4 rounded-sm">🔎</button>
        </div>
      </div>

      <!-- Sezione PERCORSO (solo desktop: richiede mappa) -->
      <div class="border-t border-border pt-6 mt-6">
        <h2 class="text-sm font-semibold mb-3 text-primary">🛣️ Analisi Percorso</h2>
        <div class="hidden md:block">
          <button onclick="toggleDrawing()" id="drawBtn" class="w-full bg-primary text-black font-semibold py-2 rounded-sm text-sm hover:bg-emerald-600">
            ✏️ Disegna percorso
          </button>
          <div id="routeControls" class="hidden space-y-4 mt-4 bg-background p-4 rounded-sm border border-border">
            <div class="flex justify-between text-sm"><span>Lunghezza:</span><span id="routeLength" class="font-medium text-primary">0.0 km</span></div>
            <div class="flex gap-2">
              <button onclick="undoLastPoint()" class="flex-1 bg-border hover:bg-zinc-700 py-1 rounded-sm text-xs">Annulla</button>
              <button onclick="clearRoute()" class="flex-1 bg-red-900/50 text-red-200 py-1 rounded-sm text-xs">Cancella</button>
            </div>
            <select id="interval" class="w-full bg-card border border-border rounded-sm p-2 text-sm">
              <option value="500">500 metri</option><option value="1000" selected>1 km</option>
            </select>
            <button onclick="finishAndAnalyze()" class="w-full bg-primary text-black font-semibold py-2 rounded-sm text-sm hover:bg-emerald-600">✅ Analizza</button>
          </div>
          <div id="routeResults" class="mt-4 space-y-2"></div>
        </div>
        <p class="md:hidden text-xs text-muted">Disponibile da desktop</p>
      </div>

      <!-- Controlli -->
      <div class="space-y-4 mt-8 pt-6 border-t border-border">
        <div>
          <label class="text-xs text-muted block mb-1">Carburante</label>
          <select id="fuel" class="w-full bg-background border border-border rounded-sm p-2 text-sm outline-none">
            <option value="benzina" selected>Benzina</option><option value="gasolio">Gasolio</option><option value="gpl">GPL</option><option value="metano">Metano</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-muted block mb-1">Raggio (km): <span id="distanceValue">5 km</span></label>
          <input type="range" id="distance" min="1" max="25" value="5" class="w-full accent-primary">
        </div>
        <div>
          <label class="text-xs text-muted block mb-1 flex items-center gap-1">
            <span>Prezzi aggiornati negli ultimi (gg): <span id="maxAgeValue">7 gg</span></span>
            <button type="button" id="freshnessInfoBtn" aria-label="Mostra legenda colori data" aria-expanded="false" aria-controls="freshnessLegend"
                    class="ml-auto w-5 h-5 rounded-full border border-border text-[10px] leading-none text-muted hover:text-white hover:border-primary flex items-center justify-center">ⓘ</button>
          </label>
          <input type="range" id="maxAge" min="1" max="15" value="7" class="w-full accent-primary" aria-describedby="freshnessLegend">
          <div id="freshnessLegend" class="hidden mt-2 text-[11px] bg-background border border-border rounded-sm p-2 space-y-1" role="region" aria-label="Legenda colori data aggiornamento">
            <div><span class="inline-block w-2 h-2 rounded-full bg-zinc-400 mr-1 align-middle"></span><span class="text-muted">Grigio: aggiornato negli ultimi <span id="legendWarnDays"></span> giorni</span></div>
            <div><span class="inline-block w-2 h-2 rounded-full bg-yellow-400 mr-1 align-middle"></span><span class="text-yellow-400">Giallo: tra <span id="legendWarnDays2"></span> e <span id="legendOldDays"></span> giorni fa</span></div>
            <div><span class="inline-block w-2 h-2 rounded-full bg-red-400 mr-1 align-middle"></span><span class="text-red-400">Rosso: più di <span id="legendOldDays2"></span> giorni fa</span></div>
          </div>
        </div>
        <div>
          <label class="text-xs text-muted block mb-1">Numero di risultati</label>
          <input type="number" id="results" value="15" min="5" max="50" class="w-full bg-background border border-border rounded-sm p-2 text-sm outline-none">
        </div>
        <div id="iosMapPref" class="hidden">
          <label class="text-xs text-muted block mb-1" for="iosMapApp">Apri mappe con</label>
          <select id="iosMapApp" class="w-full bg-background border border-border rounded-sm p-2 text-sm outline-none">
            <option value="apple">Apple Maps</option>
            <option value="google">Google Maps</option>
          </select>
        </div>

        <button onclick="cerca()" class="w-full bg-primary text-black font-bold py-3 rounded-sm hover:bg-emerald-600 text-lg">🔎 Cerca</button>
        <button onclick="usaPosizioneAttuale()" class="w-full border border-border hover:bg-border py-2 rounded-sm text-sm">📍 Posizione attuale</button>
      </div>

      <div id="lista" class="mt-8 space-y-3"></div>

      <div class="mt-8 pt-6 border-t border-border flex justify-center">
        <a href="https://ko-fi.com/S6S41L5113" target="_blank" rel="noopener noreferrer">
          <img src="https://ko-fi.com/img/githubbutton_sm.svg" alt="Support me on Ko-fi" style="height:32px">
        </a>
      </div>
    </div>

    <div id="map" class="flex-1"></div>
  </div>

  <script>
    let map, markers = [], searchMarker = null, currentLat = null, currentLon = null;
    let routePoints = [], routePolyline = null, routeMarkers = [], isDrawing = false;
    const API_BASE = ''; // Lascia vuoto per Render

    // Parsing della data "DD/MM/YYYY HH:MM:SS" restituita dall'API
    function parseApiDate(raw) {
      if (!raw || typeof raw !== 'string') return null;
      const [datePart, timePart] = raw.split(' ');
      if (!datePart) return null;
      const [day, month, year] = datePart.split('/');
      if (!day || !month || !year) return null;
      const iso = `${year}-${month}-${day}T${timePart || '00:00:00'}`;
      const d = new Date(iso);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateDDMMYYYY(d) {
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      return `${dd}-${mm}-${yyyy}`;
    }

    function ageInDays(d) {
      return (Date.now() - d.getTime()) / (1000 * 60 * 60 * 24);
    }

    function formatRelative(days) {
      const n = Math.floor(days);
      if (n <= 0) return 'oggi';
      if (n === 1) return 'ieri';
      return `${n} giorni fa`;
    }

    // Soglie di freschezza (in giorni)
    const FRESHNESS_WARN_DAYS = 3;
    const FRESHNESS_OLD_DAYS = 7;

    const COLOR_LEGEND = `Grigio: aggiornato negli ultimi ${FRESHNESS_WARN_DAYS} giorni\nGiallo: tra ${FRESHNESS_WARN_DAYS} e ${FRESHNESS_OLD_DAYS} giorni fa\nRosso: più di ${FRESHNESS_OLD_DAYS} giorni fa`;

    // Restituisce { text, relative, tooltip, cardClass, popupColor }
    function getDateDisplay(rawDate) {
      const d = parseApiDate(rawDate);
      if (!d) return { text: 'n/d', relative: '', tooltip: 'Data di aggiornamento non disponibile', cardClass: 'text-muted', popupColor: '#6b7280' };
      const days = ageInDays(d);
      const text = formatDateDDMMYYYY(d);
      const relative = formatRelative(days);
      const tooltip = `Aggiornato il ${text} (${relative})\n\n${COLOR_LEGEND}`;
      if (days > FRESHNESS_OLD_DAYS) return { text, relative, tooltip, cardClass: 'text-red-400', popupColor: '#b91c1c' };
      if (days > FRESHNESS_WARN_DAYS) return { text, relative, tooltip, cardClass: 'text-yellow-400', popupColor: '#b45309' };
      return { text, relative, tooltip, cardClass: 'text-muted', popupColor: '#6b7280' };
    }

    function isDesktopLayout() {
      return window.matchMedia('(min-width: 768px)').matches;
    }

    function initMap() {
      if (!isDesktopLayout()) return; // mappa solo da desktop
      map = L.map('map').setView([41.9028, 12.4964], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
      map.on('click', (e) => {
        if (isDrawing) { routePoints.push(e.latlng); redrawRoutePolyline(); updateRouteLength(); }
        else setSearchCenter(e.latlng);
      });
    }

    const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent || '');
    const IS_ANDROID = /android/i.test(navigator.userAgent || '');
    const MAPS_PREF_KEY = 'mapsApp'; // 'apple' | 'google'

    // Apre l'app/sito di mappe esterno per le coordinate fornite
    function openExternalMap(lat, lon, label) {
      const labelEnc = encodeURIComponent(label || '');
      let url;
      if (IS_ANDROID) {
        // geo: rispetta l'app default scelta dall'utente (Google Maps, Waze, ecc.)
        url = `geo:${lat},${lon}?q=${lat},${lon}(${labelEnc})`;
      } else if (IS_IOS) {
        const pref = localStorage.getItem(MAPS_PREF_KEY) || 'apple';
        url = pref === 'google'
          ? `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`
          : `https://maps.apple.com/?ll=${lat},${lon}&q=${labelEnc}`;
      } else {
        url = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
      }
      window.open(url, '_blank', 'noopener');
    }

 // --- FUNZIONI ORIGINALI INSERITE ---
    function setSearchCenter(latlng) {
      currentLat = latlng.lat; currentLon = latlng.lng;
      if (!map) return;
      if (searchMarker) map.removeLayer(searchMarker);
      searchMarker = L.marker(latlng, { draggable: true }).addTo(map).bindPopup('📍 Centro').openPopup();
      searchMarker.on('dragend', () => { const pos = searchMarker.getLatLng(); currentLat = pos.lat; currentLon = pos.lng; });
    }

    function redrawRoutePolyline() {
      if (routePolyline) map.removeLayer(routePolyline);
      if (routePoints.length < 1) return;
      routePolyline = L.polyline(routePoints, { color: '#10b981', weight: 6, dashArray: '12, 8', opacity: 0.85 }).addTo(map);
    }

    function updateRouteLength() {
      let length = 0;
      for (let i = 1; i < routePoints.length; i++) length += routePoints[i-1].distanceTo(routePoints[i]);
      document.getElementById('routeLength').textContent = (length / 1000).toFixed(1) + ' km';
    }

    function toggleDrawing() {
      isDrawing = !isDrawing;
      const btn = document.getElementById('drawBtn');
      const controls = document.getElementById('routeControls');
      if (isDrawing) { btn.innerHTML = '🛑 Stop Disegno'; controls.classList.remove('hidden'); routePoints = []; if(routePolyline) map.removeLayer(routePolyline); routePolyline = null; } 
      else { btn.innerHTML = '✏️ Disegna percorso'; controls.classList.add('hidden'); }
    }

    function undoLastPoint() { if(routePoints.length > 0) { routePoints.pop(); redrawRoutePolyline(); updateRouteLength(); } }
    
    function clearRoute() { routePoints = []; if(routePolyline) map.removeLayer(routePolyline); routePolyline = null; routeMarkers.forEach(m => map.removeLayer(m)); routeMarkers = []; document.getElementById('routeResults').innerHTML = ''; document.getElementById('routeControls').classList.add('hidden'); toggleDrawing(); }

    function getSamplePointsWithDist(points, interval) {
      if (points.length < 2) return [];
      const result = []; let totalDist = 0; result.push({latlng: points[0], dist: 0});
      for (let i = 1; i < points.length; i++) {
        const from = points[i-1]; const to = points[i]; const segLength = from.distanceTo(to); let localDist = interval;
        while (localDist < segLength) { const frac = localDist / segLength; const latlng = L.latLng(from.lat + frac*(to.lat-from.lat), from.lng + frac*(to.lng-from.lng)); result.push({latlng, dist: totalDist + localDist}); localDist += interval; }
        totalDist += segLength;
      }
      result.push({latlng: points[points.length-1], dist: totalDist});
      return result;
    }

    async function finishAndAnalyze() {
      if (routePoints.length < 2) return alert("Disegna almeno due punti!");
      const interval = parseInt(document.getElementById('interval').value);
      const fuel = document.getElementById('fuel').value;
      const samples = getSamplePointsWithDist(routePoints, interval);
      routeMarkers.forEach(m => map.removeLayer(m)); routeMarkers = [];
      document.getElementById('routeResults').innerHTML = `<p class="text-xs text-muted">Analizzando ${samples.length} punti...</p>`;
      
      const responses = await Promise.all(samples.map(s =>
        fetch(`${API_BASE}/api/distributori?latitude=${s.latlng.lat}&longitude=${s.latlng.lng}&distance=5&fuel=${fuel}&results=1`)
          .then(r => r.ok ? r.json() : [])
          .then(data => ({ data, dist: s.dist }))
          .catch(() => ({ data: [], dist: s.dist }))
      ));
      const maxAge = getMaxAgeDays();
      const unique = new Map();
      for (const { data, dist } of responses) {
        const filtered = filterByMaxAge(data, maxAge);
        if (filtered.length === 0) continue;
        const st = filtered[0];
        const key = `${st.gestore}|${st.indirizzo}`.toLowerCase();
        if (!unique.has(key)) unique.set(key, { ...st, routeDist: dist / 1000 });
      }
      const sorted = Array.from(unique.values()).sort((a,b) => a.routeDist - b.routeDist);
      let html = `<h3 class="text-xs font-semibold text-primary mb-1">Migliori lungo percorso (${sorted.length})</h3>`;
      sorted.forEach(st => {
        const dateInfo = getDateDisplay(st.data);
        const relSuffix = dateInfo.relative ? ` · ${dateInfo.relative}` : '';
        const marker = L.marker([st.latitudine, st.longitudine]).addTo(map).bindPopup(`<b>${st.gestore}</b><br>${st.indirizzo}<br><span style="color:#10b981;font-weight:bold">Km ${st.routeDist.toFixed(1)} • ${st.prezzo.toFixed(3)} €</span><br><span style="color:${dateInfo.popupColor}" title="${dateInfo.tooltip}" aria-label="${dateInfo.tooltip.replace(/\n/g, ' — ')}">Aggiornato: ${dateInfo.text}${relSuffix}</span>`);
        routeMarkers.push(marker);
        html += `<div class="bg-background border border-border p-2 rounded-sm cursor-pointer" onclick="map.flyTo([${st.latitudine},${st.longitudine}], 15)"><div class="text-xs text-muted mb-0.5">Al km ${st.routeDist.toFixed(1)}</div><div class="text-xs font-medium">${st.gestore}</div><div class="text-[10px] text-muted">${st.indirizzo}</div><div class="flex justify-between items-center mt-1"><span class="text-sm font-bold text-primary">${st.prezzo.toFixed(3)}€</span><span class="text-[10px] ${dateInfo.cardClass}" title="${dateInfo.tooltip}" aria-label="${dateInfo.tooltip.replace(/\n/g, ' — ')}">${dateInfo.text}${relSuffix}</span></div></div>`;
      });
      document.getElementById('routeResults').innerHTML = html || '<p class="text-xs text-muted">Nessun distributore trovato lungo il percorso.</p>';
    }

    async function cerca(lat = null, lon = null) {
      const fuel = document.getElementById('fuel').value;
      const dist = document.getElementById('distance').value;
      const resCount = document.getElementById('results').value;
      if (!lat || !lon) {
        if (currentLat && currentLon) { lat = currentLat; lon = currentLon; }
        else if (map) { const c = map.getCenter(); lat = c.lat; lon = c.lng; }
        else { alert("Cerca prima una città o usa la posizione attuale."); return; }
      }
      if (map) { markers.forEach(m => map.removeLayer(m)); markers = []; }
      try {
        const raw = await (await fetch(`${API_BASE}/api/distributori?latitude=${lat}&longitude=${lon}&distance=${dist}&fuel=${fuel}&results=${resCount}`)).json();
        const data = filterByMaxAge(raw, getMaxAgeDays());
        document.getElementById('lista').innerHTML = `<h2 class="text-sm font-semibold">Risultati (${data.length})</h2>`;
        data.forEach(st => {
          const dateInfo = getDateDisplay(st.data);
          const relSuffix = dateInfo.relative ? ` · ${dateInfo.relative}` : '';
          if (map) {
            const m = L.marker([st.latitudine, st.longitudine]).addTo(map).bindPopup(`
              <b>${st.gestore}</b><br>${st.indirizzo}<br>
              <span style="color:#10b981;font-weight:bold">${st.prezzo.toFixed(3)} €/litro</span><br>
              ${st.self ? '🟢 Self' : '🔧 Servito'} • ${st.distanza} km<br>
              <span style="color:${dateInfo.popupColor}" title="${dateInfo.tooltip}" aria-label="${dateInfo.tooltip.replace(/\n/g, ' — ')}">Aggiornato: ${dateInfo.text}${relSuffix}</span>
            `);
            markers.push(m);
          }
          const div = document.createElement('div');
          div.className = "bg-background border border-border p-3 rounded-sm hover:border-primary cursor-pointer";
          div.innerHTML = `<div class="text-sm font-medium">${st.gestore}</div><div class="text-xs text-muted">${st.indirizzo}</div><div class="flex justify-between mt-1"><span class="text-sm font-bold text-primary">${st.prezzo.toFixed(3)}€</span><span class="text-xs text-muted">${st.distanza} km</span></div><div class="text-[10px] mt-1 ${dateInfo.cardClass}" title="${dateInfo.tooltip}" aria-label="${dateInfo.tooltip.replace(/\n/g, ' — ')}">Aggiornato: ${dateInfo.text}${relSuffix}</div>`;
          div.onclick = () => {
            if (map) map.flyTo([st.latitudine, st.longitudine], 16);
            else openExternalMap(st.latitudine, st.longitudine, st.gestore);
          };
          document.getElementById('lista').appendChild(div);
        });
        if (map && data.length > 0) map.fitBounds(markers.map(m => m.getLatLng()));
      } catch(e) {
        alert("Errore di connessione al server.");
      }
    }

    async function usaPosizioneAttuale() {
      if (!navigator.geolocation) { alert("Geolocalizzazione non supportata dal browser."); return; }
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        currentLat = lat; currentLon = lon;
        if (map) {
          map.flyTo([lat, lon], 14);
          if (searchMarker) map.removeLayer(searchMarker);
          searchMarker = L.marker([lat, lon]).addTo(map).bindPopup('📍 La tua posizione attuale').openPopup();
        }
        cerca(lat, lon);
      }, () => alert("Impossibile ottenere la posizione."));
    }

    async function searchCity() {
      const query = document.getElementById('citySearch').value.trim();
      if (!query) return;
      try {
        const data = await (await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&countrycodes=it`)).json();
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          if (map) map.flyTo([lat, lon], 13);
          setSearchCenter({ lat, lng: lon });
        } else { alert("Città non trovata"); }
      } catch(e) { alert("Errore ricerca città"); }
    }
    
    document.getElementById('distance').addEventListener('input', function() {
      document.getElementById('distanceValue').textContent = this.value + ' km';
    });

    document.getElementById('maxAge').addEventListener('input', function() {
      document.getElementById('maxAgeValue').textContent = this.value + ' gg';
    });

    // Popola la legenda con le costanti centralizzate
    document.getElementById('legendWarnDays').textContent = FRESHNESS_WARN_DAYS;
    document.getElementById('legendWarnDays2').textContent = FRESHNESS_WARN_DAYS;
    document.getElementById('legendOldDays').textContent = FRESHNESS_OLD_DAYS;
    document.getElementById('legendOldDays2').textContent = FRESHNESS_OLD_DAYS;

    // Selettore preferenza mappe: visibile solo su iOS mobile (Android usa geo:,
    // desktop apre Google Maps web). La preferenza e' persistente in localStorage.
    if (IS_IOS && !isDesktopLayout()) {
      const pref = document.getElementById('iosMapPref');
      const select = document.getElementById('iosMapApp');
      pref.classList.remove('hidden');
      select.value = localStorage.getItem(MAPS_PREF_KEY) || 'apple';
      select.addEventListener('change', () => localStorage.setItem(MAPS_PREF_KEY, select.value));
    }

    document.getElementById('freshnessInfoBtn').addEventListener('click', function(e) {
      e.preventDefault();
      const legend = document.getElementById('freshnessLegend');
      const open = legend.classList.toggle('hidden') === false;
      this.setAttribute('aria-expanded', open ? 'true' : 'false');
    });

    function getMaxAgeDays() {
      return parseInt(document.getElementById('maxAge').value, 10);
    }

    function filterByMaxAge(stations, maxDays) {
      return stations.filter(st => {
        const d = parseApiDate(st.data);
        if (!d) return true; // se la data manca, non filtriamo
        return ageInDays(d) <= maxDays;
      });
    }

    window.onload = initMap;
  </script>
</body>
</html>
