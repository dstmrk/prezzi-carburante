<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prezzi Carburante Italia</title>
  
  <!-- Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Tailwind & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            background: '#09090b', // Sfondo scuro stile shadcn
            card: '#18181b',       // Sfondo card
            primary: '#10b981',    // Emerald-500
            border: '#27272a',
            muted: '#71717a'
          },
          borderRadius: { 'sm': '0.375rem' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    #map { height: 100vh; }
    .leaflet-control-zoom { border: none !important; }
  </style>
</head>
<body class="bg-background text-white overflow-hidden">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-96 bg-card border-r border-border p-6 overflow-auto flex flex-col gap-6">
      <div>
        <h1 class="text-2xl font-bold tracking-tight flex items-center gap-2">
          <i data-lucide="fuel" class="text-primary"></i> Prezzi Carburante
        </h1>
        <p class="text-muted text-sm mt-1">Trova i distributori più economici.</p>
      </div>

      <!-- Ricerca -->
      <div class="space-y-2">
        <label class="text-xs font-medium text-muted">Cerca località</label>
        <div class="flex gap-2">
          <input id="citySearch" type="text" placeholder="Es: Roma" 
                 class="flex-1 bg-background border border-border rounded-sm p-2 text-sm focus:ring-1 focus:ring-primary outline-none"
                 onkeydown="if(event.key === 'Enter') searchCity()">
          <button onclick="searchCity()" class="bg-primary hover:bg-emerald-600 text-black p-2 rounded-sm"><i data-lucide="search" size="18"></i></button>
        </div>
      </div>

      <!-- Controls -->
      <div class="space-y-4 pt-4 border-t border-border">
        <div>
          <label class="text-xs font-medium text-muted block mb-2">Carburante</label>
          <select id="fuel" class="w-full bg-background border border-border rounded-sm p-2 text-sm outline-none">
            <option value="benzina">Benzina</option>
            <option value="gasolio">Gasolio</option>
            <option value="gpl">GPL</option>
            <option value="metano">Metano</option>
          </select>
        </div>

        <button onclick="cerca()" class="w-full bg-primary hover:bg-emerald-600 text-black font-semibold py-2 rounded-sm text-sm transition-all">
          Cerca distributori
        </button>
        
        <button onclick="usaPosizioneAttuale()" class="w-full border border-border hover:bg-border py-2 rounded-sm text-sm flex items-center justify-center gap-2">
          <i data-lucide="map-pin" size="16"></i> Usa posizione attuale
        </button>
      </div>

      <div id="lista" class="flex flex-col gap-3 pt-4 border-t border-border"></div>
    </div>

    <!-- Mappa -->
    <div id="map" class="flex-1"></div>
  </div>

  <script>
    let map, searchMarker, markers = [];
    const API_BASE = '';

    function initMap() {
      map = L.map('map').setView([41.9028, 12.4964], 6);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB'
      }).addTo(map);
      
      lucide.createIcons();
    }

    async function cerca(lat = null, lon = null) {
      if (!lat || !lon) { 
        const c = map.getCenter(); 
        lat = c.lat; lon = c.lng; 
      }
      
      const res = await fetch(`${API_BASE}/api/distributori?latitude=${lat}&longitude=${lon}&distance=5&fuel=${document.getElementById('fuel').value}&results=10`);
      const data = await res.json();
      
      markers.forEach(m => map.removeLayer(m));
      const lista = document.getElementById('lista');
      lista.innerHTML = '<h2 class="text-sm font-semibold">Risultati</h2>';
      
      data.forEach(st => {
        const marker = L.marker([st.latitudine, st.longitudine]).addTo(map);
        markers.push(marker);
        
        const div = document.createElement('div');
        div.className = "bg-background border border-border p-3 rounded-sm hover:border-primary cursor-pointer transition-all";
        div.innerHTML = `
          <div class="flex justify-between items-center">
            <div>
              <div class="text-sm font-medium">${st.gestore}</div>
              <div class="text-xs text-muted">${st.indirizzo}</div>
            </div>
            <div class="text-primary font-bold">${st.prezzo.toFixed(3)}€</div>
          </div>
        `;
        div.onclick = () => map.flyTo([st.latitudine, st.longitudine], 16);
        lista.appendChild(div);
      });
      lucide.createIcons();
    }

    async function usaPosizioneAttuale() {
      navigator.geolocation.getCurrentPosition(pos => {
        map.flyTo([pos.coords.latitude, pos.coords.longitude], 14);
        cerca(pos.coords.latitude, pos.coords.longitude);
      });
    }

    async function searchCity() {
      const q = document.getElementById('citySearch').value;
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1`);
      const data = await res.json();
      if (data.length) {
        map.flyTo([data[0].lat, data[0].lon], 13);
        cerca(data[0].lat, data[0].lon);
      }
    }

    window.onload = initMap;
  </script>
</body>
</html>
