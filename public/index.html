<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prezzi Carburante Italia • Mappa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #map { height: 100vh; }
    .leaflet-popup-content { font-size: 14px; }
  </style>
</head>
<body class="bg-gray-900 text-white">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-96 bg-gray-800 p-6 overflow-auto">
      <h1 class="text-3xl font-bold mb-6 text-green-400">⛽ Prezzi Carburante</h1>

      <!-- Ricerca città -->
      <div class="mb-6">
        <label class="block text-sm mb-1">Cerca città o indirizzo</label>
        <div class="flex gap-2">
          <input id="citySearch" type="text" placeholder="Roma, Milano, Napoli..." 
                 class="flex-1 bg-gray-700 rounded-lg p-3 text-white placeholder-gray-400"
                 onkeydown="if(event.key === 'Enter') searchCity()">
          <button onclick="searchCity()" class="bg-gray-600 hover:bg-gray-500 px-6 rounded-xl font-medium">🔎</button>
        </div>
      </div>

      <div class="text-sm text-gray-400 mb-4">
        👆 Clicca sulla mappa per centro ricerca (pin verde)<br>
        o usa la modalità Percorso qui sotto
      </div>

      <!-- Sezione PERCORSO -->
      <div class="mt-6 border-t border-gray-700 pt-6">
        <h2 class="text-lg font-semibold mb-3 flex items-center gap-2"><span class="text-lime-400">🛣️</span> Analisi Percorso</h2>
        
        <button onclick="toggleDrawing()" id="drawBtn"
                class="w-full bg-lime-500 hover:bg-lime-600 text-black font-bold py-3 rounded-xl mb-4">
          ✏️ Disegna percorso sulla mappa
        </button>

        <div id="routeControls" class="hidden space-y-4">
          <div class="flex justify-between text-sm">
            <span>Lunghezza percorso:</span>
            <span id="routeLength" class="font-medium text-lime-400">0.0 km</span>
          </div>

          <div class="flex gap-2">
            <button onclick="undoLastPoint()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-xl text-sm">Annulla ultimo</button>
            <button onclick="clearRoute()" class="flex-1 bg-red-600 hover:bg-red-500 py-2 rounded-xl text-sm">Cancella tutto</button>
          </div>

          <div>
            <label class="block text-sm mb-1">Campiona ogni</label>
            <select id="interval" class="w-full bg-gray-700 rounded-lg p-3">
              <option value="500">500 metri</option>
              <option value="1000" selected>1 km</option>
            </select>
          </div>

          <button onclick="finishAndAnalyze()" 
                  class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-4 rounded-xl">
            ✅ Fine percorso e analizza
          </button>
        </div>

        <div id="routeResults" class="mt-6 space-y-3"></div>
      </div>

      <!-- Controlli normali -->
      <div class="space-y-4 mt-8">
        <div>
          <label class="block text-sm mb-1">Tipo di carburante</label>
          <select id="fuel" class="w-full bg-gray-700 rounded-lg p-3">
            <option value="benzina" selected>Benzina</option>
            <option value="gasolio">Gasolio</option>
            <option value="gpl">GPL</option>
            <option value="metano">Metano</option>
            <option value="super">Super</option>
          </select>
        </div>

        <div>
          <label class="block text-sm mb-1">Raggio di ricerca (km)</label>
          <input type="range" id="distance" min="1" max="25" value="5" class="w-full accent-green-400">
          <span id="distanceValue" class="text-sm text-gray-400">5 km</span>
        </div>

        <div>
          <label class="block text-sm mb-1">Numero di risultati</label>
          <input type="number" id="results" value="15" min="5" max="50" class="w-full bg-gray-700 rounded-lg p-3">
        </div>

        <button onclick="cerca()" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-4 rounded-xl text-lg">
          🔎 Cerca distributori più economici
        </button>

        <button onclick="usaPosizioneAttuale()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl flex items-center justify-center gap-2">
          📍 Usa la mia posizione attuale
        </button>
      </div>

      <div id="lista" class="mt-8 space-y-3"></div>
    </div>

    <!-- Mappa -->
    <div id="map" class="flex-1"></div>
  </div>

  <script>
    let map;
    let markers = [];
    let searchMarker = null;
    let currentLat = null;
    let currentLon = null;
    let routePoints = [];
    let routePolyline = null;
    let routeMarkers = [];
    let isDrawing = false;
    const API_BASE = '';

    function initMap() {
      map = L.map('map').setView([41.9028, 12.4964], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);

      map.on('click', function(e) {
        if (isDrawing) {
          routePoints.push(e.latlng);
          redrawRoutePolyline();
          updateRouteLength();
        } else {
          setSearchCenter(e.latlng);
        }
      });
    }

    function setSearchCenter(latlng) {
      if (searchMarker) map.removeLayer(searchMarker);
      searchMarker = L.marker(latlng, { draggable: true })
        .addTo(map)
        .bindPopup('📍 Centro di ricerca<br>Trascina per spostare')
        .openPopup();
      searchMarker.on('dragend', function() {
        const pos = searchMarker.getLatLng();
        currentLat = pos.lat; currentLon = pos.lng;
      });
      currentLat = latlng.lat; currentLon = latlng.lng;
    }

    function redrawRoutePolyline() {
      if (routePolyline) map.removeLayer(routePolyline);
      if (routePoints.length < 1) return;
      routePolyline = L.polyline(routePoints, {
        color: '#84cc16', weight: 6, dashArray: '12, 8', opacity: 0.85
      }).addTo(map);
    }

    function updateRouteLength() {
      let length = 0;
      for (let i = 1; i < routePoints.length; i++) {
        length += routePoints[i-1].distanceTo(routePoints[i]);
      }
      document.getElementById('routeLength').textContent = (length / 1000).toFixed(1) + ' km';
    }

    function toggleDrawing() {
      isDrawing = !isDrawing;
      const btn = document.getElementById('drawBtn');
      const controls = document.getElementById('routeControls');
      if (isDrawing) {
        btn.innerHTML = '🛑 Stoppa disegno percorso';
        controls.classList.remove('hidden');
        routePoints = [];
        if (routePolyline) map.removeLayer(routePolyline);
        routePolyline = null;
        document.getElementById('routeLength').textContent = '0.0 km';
      } else {
        btn.innerHTML = '✏️ Disegna percorso sulla mappa';
        controls.classList.add('hidden');
      }
    }

    function undoLastPoint() {
      if (routePoints.length > 0) {
        routePoints.pop();
        redrawRoutePolyline();
        updateRouteLength();
      }
    }

    function clearRoute() {
      routePoints = [];
      if (routePolyline) map.removeLayer(routePolyline);
      routePolyline = null;
      routeMarkers.forEach(m => map.removeLayer(m));
      routeMarkers = [];
      document.getElementById('routeResults').innerHTML = '';
      document.getElementById('routeControls').classList.add('hidden');
      toggleDrawing(); // reset button
    }

    // Campiona punti ogni X metri (con distanza esatta dal punto di partenza)
    function getSamplePointsWithDist(points, interval) {
      if (points.length < 2) return [];
      const result = [];
      let totalDist = 0;
      result.push({latlng: L.latLng(points[0].lat, points[0].lng), dist: 0});

      for (let i = 1; i < points.length; i++) {
        const from = points[i-1];
        const to = points[i];
        const segLength = from.distanceTo(to);
        let localDist = interval;

        while (localDist < segLength) {
          const frac = localDist / segLength;
          const latlng = L.latLng(
            from.lat + frac * (to.lat - from.lat),
            from.lng + frac * (to.lng - from.lng)
          );
          result.push({latlng, dist: totalDist + localDist});
          localDist += interval;
        }
        totalDist += segLength;
      }
      result.push({latlng: L.latLng(points[points.length-1].lat, points[points.length-1].lng), dist: totalDist});
      return result;
    }

    async function finishAndAnalyze() {
      if (routePoints.length < 2) {
        alert("Disegna almeno due punti per creare un percorso!");
        return;
      }
      const interval = parseInt(document.getElementById('interval').value);
      const fuel = document.getElementById('fuel').value;
      const radius = 5; // raggio fisso per analisi lungo strada (più preciso)
      const samples = getSamplePointsWithDist(routePoints, interval);

      // Pulisci vecchi risultati percorso
      routeMarkers.forEach(m => map.removeLayer(m));
      routeMarkers = [];
      document.getElementById('routeResults').innerHTML = `<p class="text-lime-400">🔄 Analizzando ${samples.length} punti lungo il percorso...</p>`;

      const uniqueStations = new Map();

      for (let sample of samples) {
        const url = `${API_BASE}/api/distributori?latitude=${sample.latlng.lat}&longitude=${sample.latlng.lng}&distance=${radius}&fuel=${fuel}&results=1`;
        try {
          const res = await fetch(url);
          const data = await res.json();
          if (data && data.length > 0) {
            const station = data[0];
            const key = `${station.gestore || ''}|${station.indirizzo || ''}`.toLowerCase();
            if (!uniqueStations.has(key)) {
              uniqueStations.set(key, { ...station, routeDist: sample.dist / 1000 });
            }
          }
        } catch(e) {}
      }

      const sorted = Array.from(uniqueStations.values()).sort((a, b) => a.routeDist - b.routeDist);

      let html = `<h3 class="font-semibold mb-3 text-lime-400">🚩 Migliori distributori lungo il percorso (${sorted.length})</h3>`;
      sorted.forEach(st => {
        const marker = L.marker([st.latitudine, st.longitudine])
          .addTo(map)
          .bindPopup(`<b>${st.gestore}</b><br>${st.indirizzo}<br><span class="text-green-600 font-bold">Al km ${st.routeDist.toFixed(1)} • ${st.prezzo.toFixed(3)} €</span>`);
        routeMarkers.push(marker);

        html += `
          <div class="bg-gray-700 rounded-xl p-4 cursor-pointer hover:bg-gray-600" onclick="map.flyTo([${st.latitudine},${st.longitudine}], 15)">
            <div class="text-xs text-gray-400 mb-1">Al km ${st.routeDist.toFixed(1)}</div>
            <div class="flex justify-between items-center">
              <div>
                <div class="font-semibold">${st.gestore}</div>
                <div class="text-sm text-gray-400">${st.indirizzo}</div>
              </div>
              <div class="text-right">
                <div class="text-3xl font-bold text-green-400">${st.prezzo.toFixed(3)}€</div>
              </div>
            </div>
          </div>`;
      });

      document.getElementById('routeResults').innerHTML = html || '<p class="text-gray-400">Nessun distributore trovato lungo il percorso.</p>';
    }

    // (tutto il resto delle funzioni cerca(), usaPosizioneAttuale(), searchCity() rimane identico a prima)
    async function cerca(lat = null, lon = null) {
      const fuel = document.getElementById('fuel').value;
      const distance = document.getElementById('distance').value;
      const results = document.getElementById('results').value;

      if (!lat || !lon) {
        if (currentLat && currentLon) { lat = currentLat; lon = currentLon; }
        else { const c = map.getCenter(); lat = c.lat; lon = c.lng; }
      }

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const url = `${API_BASE}/api/distributori?latitude=${lat}&longitude=${lon}&distance=${distance}&fuel=${fuel}&results=${results}`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();

        document.getElementById('lista').innerHTML = `<h2 class="text-xl font-semibold mb-4">Risultati (${data.length})</h2>`;

        data.forEach(station => {
          const marker = L.marker([station.latitudine, station.longitudine])
            .addTo(map)
            .bindPopup(`
              <b>${station.gestore}</b><br>
              ${station.indirizzo}<br>
              <span class="text-green-600 font-bold">${station.prezzo.toFixed(3)} €/litro</span><br>
              ${station.self ? '🟢 Self' : '🔧 Servito'} • ${station.distanza} km
            `);
          markers.push(marker);

          const div = document.createElement('div');
          div.className = "bg-gray-700 rounded-xl p-4 cursor-pointer hover:bg-gray-600";
          div.innerHTML = `
            <div class="flex justify-between">
              <div>
                <div class="font-semibold">${station.gestore}</div>
                <div class="text-sm text-gray-400">${station.indirizzo}</div>
              </div>
              <div class="text-right">
                <div class="text-2xl font-bold text-green-400">${station.prezzo.toFixed(3)}€</div>
                <div class="text-xs text-gray-400">${station.distanza} km</div>
              </div>
            </div>
          `;
          div.onclick = () => map.flyTo([station.latitudine, station.longitudine], 16);
          document.getElementById('lista').appendChild(div);
        });

        if (data.length > 0) map.fitBounds(markers.map(m => m.getLatLng()));
      } catch(e) {
        alert("Errore di connessione al server.");
      }
    }

    async function usaPosizioneAttuale() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          map.flyTo([lat, lon], 14);
          if (searchMarker) map.removeLayer(searchMarker);
          searchMarker = L.marker([lat, lon]).addTo(map).bindPopup('📍 La tua posizione attuale').openPopup();
          currentLat = lat; currentLon = lon;
          cerca(lat, lon);
        }, () => alert("Impossibile ottenere la posizione."));
      }
    }

    async function searchCity() {
      const query = document.getElementById('citySearch').value.trim();
      if (!query) return;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&countrycodes=it`);
        const data = await res.json();
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          map.flyTo([lat, lon], 13);
          setSearchCenter({ lat, lng: lon });
          document.getElementById('citySearch').value = data[0].display_name.split(',')[0];
        } else alert("Città non trovata");
      } catch(e) { alert("Errore ricerca città"); }
    }

    document.getElementById('distance').addEventListener('input', function() {
      document.getElementById('distanceValue').textContent = this.value + ' km';
    });

    window.onload = initMap;
  </script>
</body>
</html>
