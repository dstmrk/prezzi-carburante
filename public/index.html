<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prezzi Carburante Italia</title>
  
  <!-- Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Tailwind personalizzato -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            background: '#09090b',
            card: '#18181b',
            border: '#27272a',
            primary: '#10b981', // Emerald
            'primary-foreground': '#000000',
            muted: '#a1a1aa'
          },
          borderRadius: { 'sm': '0.375rem' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    #map { height: 100vh; }
    .leaflet-popup-content { color: #000; font-size: 14px; }
  </style>
</head>
<body class="bg-background text-white">

  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-96 bg-card border-r border-border p-6 overflow-auto">
      <h1 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <span class="text-primary">⛽</span> Prezzi Carburante
      </h1>

      <!-- Ricerca -->
      <div class="mb-6 space-y-2">
        <label class="text-xs font-medium text-muted">Cerca città o indirizzo</label>
        <div class="flex gap-2">
          <input id="citySearch" type="text" placeholder="Roma, Milano..." 
                 class="flex-1 bg-background border border-border rounded-sm p-2 text-sm focus:ring-1 focus:ring-primary outline-none"
                 onkeydown="if(event.key === 'Enter') searchCity()">
          <button onclick="searchCity()" class="bg-border hover:bg-zinc-700 px-4 rounded-sm">🔎</button>
        </div>
      </div>

      <!-- Sezione PERCORSO -->
      <div class="border-t border-border pt-6 mt-6">
        <h2 class="text-sm font-semibold mb-3 text-primary">🛣️ Analisi Percorso</h2>
        <button onclick="toggleDrawing()" id="drawBtn" class="w-full bg-primary text-black font-semibold py-2 rounded-sm text-sm hover:bg-emerald-600">
          ✏️ Disegna percorso
        </button>

        <div id="routeControls" class="hidden space-y-4 mt-4 bg-background p-4 rounded-sm border border-border">
          <div class="flex justify-between text-sm">
            <span>Lunghezza:</span>
            <span id="routeLength" class="font-medium text-primary">0.0 km</span>
          </div>
          <div class="flex gap-2">
            <button onclick="undoLastPoint()" class="flex-1 bg-border hover:bg-zinc-700 py-1 rounded-sm text-xs">Annulla</button>
            <button onclick="clearRoute()" class="flex-1 bg-red-900/50 hover:bg-red-900 py-1 rounded-sm text-xs text-red-200">Cancella</button>
          </div>
          <select id="interval" class="w-full bg-card border border-border rounded-sm p-2 text-sm">
            <option value="500">500 metri</option>
            <option value="1000" selected>1 km</option>
          </select>
          <button onclick="finishAndAnalyze()" class="w-full bg-primary text-black font-semibold py-2 rounded-sm text-sm hover:bg-emerald-600">
            ✅ Analizza percorso
          </button>
        </div>
        <div id="routeResults" class="mt-4 space-y-2"></div>
      </div>

      <!-- Controlli -->
      <div class="space-y-4 mt-8 pt-6 border-t border-border">
        <div>
          <label class="text-xs text-muted block mb-1">Carburante</label>
          <select id="fuel" class="w-full bg-background border border-border rounded-sm p-2 text-sm outline-none">
            <option value="benzina">Benzina</option>
            <option value="gasolio">Gasolio</option>
            <option value="gpl">GPL</option>
            <option value="metano">Metano</option>
          </select>
        </div>
        
        <div>
          <label class="text-xs text-muted block mb-1">Raggio (km): <span id="distanceValue">5 km</span></label>
          <input type="range" id="distance" min="1" max="25" value="5" class="w-full accent-primary">
        </div>

        <button onclick="cerca()" class="w-full bg-primary text-black font-semibold py-3 rounded-sm hover:bg-emerald-600 transition">
          🔎 Cerca distributori
        </button>
        <button onclick="usaPosizioneAttuale()" class="w-full border border-border hover:bg-border py-2 rounded-sm text-sm">
          📍 Posizione attuale
        </button>
      </div>

      <div id="lista" class="mt-8 space-y-3"></div>
    </div>

    <!-- Mappa -->
    <div id="map" class="flex-1"></div>
  </div>

  <!-- SCRIPT (La tua logica originale identica) -->
  <script>
    let map, markers = [], searchMarker = null, currentLat = null, currentLon = null;
    let routePoints = [], routePolyline = null, routeMarkers = [], isDrawing = false;
    const API_BASE = '';

    function initMap() {
      map = L.map('map').setView([41.9028, 12.4964], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
      map.on('click', (e) => {
        if (isDrawing) { routePoints.push(e.latlng); redrawRoutePolyline(); updateRouteLength(); }
        else setSearchCenter(e.latlng);
      });
    }

    // ... (Inserisci qui tutte le tue funzioni originali: setSearchCenter, redrawRoutePolyline, updateRouteLength, toggleDrawing, undoLastPoint, clearRoute, getSamplePointsWithDist, finishAndAnalyze, cerca, usaPosizioneAttuale, searchCity)
    
    // NOTA: Assicurati di copiare tutto il blocco script originale dal tuo vecchio file fino a "window.onload = initMap;"
    
    document.getElementById('distance').addEventListener('input', function() {
      document.getElementById('distanceValue').textContent = this.value + ' km';
    });

    window.onload = initMap;
  </script>
</body>
</html>
