<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⛽ Prezzi Carburante</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
    }

    #sidebar {
      width: 340px;
      min-width: 280px;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 8px rgba(0,0,0,0.12);
      z-index: 1000;
      overflow-y: auto;
    }

    #sidebar-header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
    }

    #sidebar-header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    #sidebar-header p {
      font-size: 0.8rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    #sidebar-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      display: block;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #1a73e8;
      background: #fff;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row > div { flex: 1; }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:active { opacity: 0.8; }

    #btn-search {
      background: #1a73e8;
      color: #fff;
    }

    #btn-search:hover { background: #1558b0; }

    #btn-geolocate {
      background: #f1f3f4;
      color: #444;
      border: 1px solid #ddd;
    }

    #btn-geolocate:hover { background: #e8eaed; }

    #divider {
      border: none;
      border-top: 1px solid #eee;
    }

    #results-section { flex: 1; }

    #results-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }

    #results-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-card {
      background: #f8f9ff;
      border: 1px solid #e0e7ff;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .result-card:hover {
      background: #eef2ff;
      border-color: #aac4ff;
    }

    .result-card.active {
      background: #e3eeff;
      border-color: #1a73e8;
    }

    .result-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .result-rank {
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      background: #1a73e8;
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
    }

    .result-gestore {
      font-size: 0.88rem;
      font-weight: 600;
      color: #222;
      flex: 1;
    }

    .result-price {
      font-size: 1rem;
      font-weight: 700;
      color: #1a73e8;
      flex-shrink: 0;
    }

    .result-self {
      font-size: 0.7rem;
      color: #888;
      margin-left: 2px;
    }

    .result-address {
      font-size: 0.78rem;
      color: #666;
      margin-top: 4px;
    }

    .result-meta {
      font-size: 0.74rem;
      color: #999;
      margin-top: 3px;
    }

    #status-msg {
      font-size: 0.82rem;
      color: #888;
      text-align: center;
      padding: 12px 0;
    }

    #status-msg.error { color: #c0392b; }

    #map {
      flex: 1;
      height: 100vh;
    }

    .search-pin-popup {
      font-size: 0.85rem;
      color: #333;
    }

    @media (max-width: 600px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; height: 50vh; min-width: unset; }
      #map { height: 50vh; }
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>⛽ Prezzi Carburante</h1>
    <p>Trova i distributori più economici vicino a te</p>
  </div>

  <div id="sidebar-body">

    <!-- Ricerca per città -->
    <div>
      <label for="city-input">Cerca città o indirizzo</label>
      <div style="display:flex;gap:6px">
        <input type="text" id="city-input" placeholder="es. Milano, Via Roma 1..." />
        <button id="btn-geocode" style="width:auto;padding:8px 12px;background:#f1f3f4;border:1px solid #ddd;color:#444;font-weight:600;font-size:0.85rem;border-radius:6px" title="Cerca">🔎</button>
      </div>
    </div>

    <hr id="divider" />

    <!-- Filtri -->
    <div>
      <label for="fuel-select">Tipo di carburante</label>
      <select id="fuel-select">
        <option value="benzina">Benzina</option>
        <option value="gasolio" selected>Gasolio</option>
        <option value="gpl">GPL</option>
        <option value="metano">Metano</option>
        <option value="super">Super</option>
      </select>
    </div>

    <div class="input-row">
      <div>
        <label for="radius-input">Raggio (km)</label>
        <input type="number" id="radius-input" value="10" min="1" max="100" />
      </div>
      <div>
        <label for="results-input">Risultati</label>
        <input type="number" id="results-input" value="10" min="1" max="50" />
      </div>
    </div>

    <button id="btn-search">🔎 Cerca distributori</button>
    <button id="btn-geolocate">📍 Usa la mia posizione</button>

    <hr id="divider" />

    <!-- Risultati -->
    <div id="results-section">
      <div id="results-title">Risultati</div>
      <div id="status-msg">Imposta un punto sulla mappa o cerca una città</div>
      <div id="results-list"></div>
    </div>

  </div>
</div>

<div id="map"></div>

<script>
  // --- Map setup ---
  const map = L.map('map').setView([41.9, 12.5], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  // --- State ---
  let searchMarker = null;
  let resultMarkers = [];
  let searchCenter = null;

  // --- Icons ---
  const greenIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
  });

  const blueIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
  });

  const redIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
  });

  // --- Set search center ---
  function setSearchCenter(lat, lon, label) {
    searchCenter = { lat, lon };

    if (searchMarker) map.removeLayer(searchMarker);
    searchMarker = L.marker([lat, lon], { icon: greenIcon })
      .addTo(map)
      .bindPopup(`<div class="search-pin-popup"><b>Centro ricerca</b><br>${label || lat.toFixed(5) + ', ' + lon.toFixed(5)}</div>`)
      .openPopup();
  }

  // --- Click on map ---
  map.on('click', (e) => {
    setSearchCenter(e.latlng.lat, e.latlng.lng, null);
    setStatus('Centro impostato. Clicca "Cerca distributori" per avviare la ricerca.');
  });

  // --- Geocode city ---
  document.getElementById('btn-geocode').addEventListener('click', geocodeCity);
  document.getElementById('city-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') geocodeCity();
  });

  async function geocodeCity() {
    const query = document.getElementById('city-input').value.trim();
    if (!query) return;

    setStatus('Ricerca indirizzo...');
    try {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=it`;
      const res = await fetch(url);
      const data = await res.json();

      if (!data.length) {
        setStatus('Indirizzo non trovato. Prova a essere più specifico.', true);
        return;
      }

      const { lat, lon, display_name } = data[0];
      const latF = parseFloat(lat), lonF = parseFloat(lon);

      setSearchCenter(latF, lonF, display_name);
      map.setView([latF, lonF], 12);
      setStatus('Centro impostato. Clicca "Cerca distributori" per avviare la ricerca.');
    } catch (err) {
      setStatus('Errore nella ricerca dell\'indirizzo.', true);
    }
  }

  // --- Geolocate ---
  document.getElementById('btn-geolocate').addEventListener('click', () => {
    if (!navigator.geolocation) {
      setStatus('Geolocalizzazione non supportata dal browser.', true);
      return;
    }
    setStatus('Rilevamento posizione...');
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        setSearchCenter(latitude, longitude, 'La tua posizione');
        map.setView([latitude, longitude], 12);
        setStatus('Posizione rilevata. Clicca "Cerca distributori".');
      },
      () => setStatus('Impossibile rilevare la posizione. Controlla i permessi del browser.', true)
    );
  });

  // --- Search ---
  document.getElementById('btn-search').addEventListener('click', searchStations);

  async function searchStations() {
    if (!searchCenter) {
      setStatus('Clicca sulla mappa, cerca una città o usa la geolocalizzazione per impostare il centro.', true);
      return;
    }

    const fuel = document.getElementById('fuel-select').value;
    const radius = parseInt(document.getElementById('radius-input').value, 10) || 10;
    const results = parseInt(document.getElementById('results-input').value, 10) || 10;

    setStatus('Ricerca in corso...');
    clearResultMarkers();
    document.getElementById('results-list').innerHTML = '';

    try {
      const params = new URLSearchParams({
        latitude: searchCenter.lat,
        longitude: searchCenter.lon,
        distance: radius,
        fuel,
        results
      });

      const res = await fetch(`/api/distributori?${params}`);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setStatus(err.error || `Errore ${res.status} dalla API.`, true);
        return;
      }

      const stations = await res.json();

      if (!stations.length) {
        setStatus(`Nessun distributore trovato entro ${radius} km per "${fuel}". Prova ad aumentare il raggio.`);
        return;
      }

      document.getElementById('status-msg').style.display = 'none';
      renderResults(stations, fuel);
    } catch (err) {
      setStatus('Errore di rete. Riprova.', true);
    }
  }

  // --- Render results ---
  function renderResults(stations, fuel) {
    const list = document.getElementById('results-list');
    list.innerHTML = '';

    stations.forEach((s, i) => {
      // Card
      const card = document.createElement('div');
      card.className = 'result-card';
      card.dataset.index = i;

      const selfLabel = s.self ? '<span class="result-self">(self)</span>' : '';
      const priceStr = s.prezzo != null ? s.prezzo.toFixed(3).replace('.', ',') + ' €' : 'N/D';

      card.innerHTML = `
        <div class="result-card-header">
          <span class="result-rank">#${s.ranking}</span>
          <span class="result-gestore">${escHtml(s.gestore || 'N/D')}</span>
          <span class="result-price">${priceStr}${selfLabel}</span>
        </div>
        <div class="result-address">${escHtml(s.indirizzo || '')}</div>
        <div class="result-meta">${s.distanza} km &bull; aggiornato: ${escHtml(s.data || 'N/D')}</div>
      `;

      card.addEventListener('click', () => {
        document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        map.setView([s.latitudine, s.longitudine], 15);
        resultMarkers[i].openPopup();
      });

      list.appendChild(card);

      // Marker (primo = rosso, altri = blu)
      const icon = i === 0 ? redIcon : blueIcon;
      const marker = L.marker([s.latitudine, s.longitudine], { icon })
        .addTo(map)
        .bindPopup(buildPopup(s, fuel));

      marker.on('click', () => {
        document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
        const c = list.querySelector(`[data-index="${i}"]`);
        if (c) {
          c.classList.add('active');
          c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });

      resultMarkers.push(marker);
    });

    // Fit map to markers
    const group = L.featureGroup(resultMarkers);
    if (searchMarker) group.addLayer(searchMarker);
    map.fitBounds(group.getBounds().pad(0.1));
  }

  function buildPopup(s, fuel) {
    const priceStr = s.prezzo != null ? s.prezzo.toFixed(3).replace('.', ',') + ' €/L' : 'N/D';
    const selfStr = s.self ? ' (self)' : '';
    return `
      <b>#${s.ranking} ${escHtml(s.gestore || '')}</b><br>
      ${escHtml(s.indirizzo || '')}<br>
      <b style="color:#1a73e8">${priceStr}${selfStr}</b> — ${escHtml(fuel)}<br>
      <small>${s.distanza} km &bull; ${escHtml(s.data || '')}</small>
    `;
  }

  // --- Helpers ---
  function clearResultMarkers() {
    resultMarkers.forEach(m => map.removeLayer(m));
    resultMarkers = [];
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status-msg');
    el.style.display = '';
    el.textContent = msg;
    el.className = isError ? 'error' : '';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
